name: Automated Preprocessing Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'namadataset_raw/**'
      - 'preprocessing/automate_Adithya_Raihan_Pratama.py'

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn joblib

    - name: Run Preprocessing Automation Script
      run: |
        python preprocessing/automate_Adithya_Raihan_Pratama.py

    - name: Commit and Push Clean Dataset & Artifacts
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "automated: update preprocessed dataset and scaling artifacts [skip ci]"
        file_pattern: 'preprocessing/**'